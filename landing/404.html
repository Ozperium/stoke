<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="mask-icon" href="/favicon.svg" color="#3bdb78">
<meta name="theme-color" content="#0a0a0b">
<!-- Without this file Cloudflare Pages falls back to index.html with a 200,
     so every typo'd URL looked like a real page to crawlers and to curl. -->
<meta name="robots" content="noindex, follow">
<title>404 — Stoke</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0b;
  --bg2: #131316;
  --border: #2a2a32;
  --text: #e4e4e7;
  --muted: #8a8a96;
  --accent: #3bdb78;
  --red: #ff5454;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  line-height: 1.6;
}
.wrap { max-width: 560px; width: 100%; }
.mark { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.mark svg { width: 26px; height: 26px; }
.mark span { font-weight: 600; letter-spacing: -0.01em; }
.term {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 13px;
  overflow-x: auto;
}
.bar {
  display: flex; gap: 6px; padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.dot { width: 10px; height: 10px; border-radius: 50%; background: #3a3a44; }
.body { padding: 16px; white-space: pre; }
.muted { color: var(--muted); }
.red { color: var(--red); }
h1 { font-size: 22px; margin: 28px 0 8px; letter-spacing: -0.02em; }
p { color: var(--muted); font-size: 15px; }
.links { margin-top: 24px; display: flex; flex-wrap: wrap; gap: 10px; }
a.btn {
  color: var(--text); text-decoration: none; font-size: 14px;
  border: 1px solid var(--border); border-radius: 7px;
  padding: 9px 15px; transition: border-color .15s, color .15s;
}
a.btn:hover { border-color: var(--accent); color: var(--accent); }
a.btn.primary { background: var(--accent); color: #06110b; border-color: var(--accent); font-weight: 600; }
a.btn.primary:hover { opacity: .9; color: #06110b; }
</style>
</head>
<body>
<div class="wrap">
  <a class="mark" href="/" style="text-decoration:none;color:inherit">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M16 3.6 L26.8 9.8 L26.8 22.2 L16 28.4 L5.2 22.2 L5.2 9.8 Z"
            fill="none" stroke="#3bdb78" stroke-width="3.2" stroke-linejoin="round"/>
    </svg>
    <span>Stoke</span>
  </a>

  <div class="term">
    <div class="bar"><i class="dot"></i><i class="dot"></i><i class="dot"></i></div>
<div class="body"><span class="muted">$</span> curl -sS https://stokegate.com<span id="path">/this-page</span>
<span class="red">✗</span> HTTP 404 <span class="muted">no such page</span></div>
  </div>

  <h1>This page doesn't exist.</h1>
  <p>Which is, admittedly, on brand: Stoke's whole job is refusing requests that shouldn't go through.</p>

  <div class="links">
    <a class="btn primary" href="/">Home</a>
    <a class="btn" href="/guides/">Guides</a>
    <a class="btn" href="https://github.com/Ozperium/stoke">GitHub</a>
  </div>
</div>
<script>
  // Echo the path the visitor actually asked for, escaped via textContent.
  var p = location.pathname;
  if (p && p !== '/') document.getElementById('path').textContent = p.slice(0, 42);
</script>
</body>
</html>
